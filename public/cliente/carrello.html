<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Carrello</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <style>
    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }
    .main-content {
      flex: 1;
      padding: 2rem;
    }
    .cart-container {
      max-width: 600px;
      margin: auto;
    }
    .hidden {
      display: none;
    }
    .cart-price-row{display:inline-flex; align-items:center; gap:.45rem; flex-wrap:wrap;}
    .cart-old-price{text-decoration:line-through; color:#6c757d; font-size:.86rem;}
    .cart-new-price{color:#146c43; font-weight:700;}
    .cart-offer-badge{border-radius:999px; padding:.15rem .5rem; font-size:.72rem; font-weight:700; color:#fff; background:linear-gradient(120deg,#198754 0%, #20c997 100%);}
  </style>
    <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("cliente");
  </script>

   <div class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
    </div>
    <a href="home.html" class="nav-link">Home</a>
    <a href="carrello.html" class="nav-link active">Carrello</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </div>

  <div class="main-content">
    <h2>Carrello</h2>
    <div class="cart-container">
      <div id="cartItems"></div>
      <button id="orderBtn" class="btn btn-primary w-100">Ordina</button>
      <div id="message" class="mt-3"></div>
    </div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var carrello = [];
    var indirizzoUtente = "";
    var ordineInCorso = false;

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }

      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;

      try {
        let response = await fetch(url, options);

        if (response.status === 401) { // token scaduto o invalido
            window.handleAuthIssue("sessione non valida");
          }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    async function recuperaCarrello() {
      try {
        var response = await fetchConControlloToken(apiBase + "/carts/me", {
          headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
        });

        if (!response.ok) throw new Error("Errore nel caricamento del carrello.");

        carrello = await response.json();
        mostraCarrello();
      } catch (err) {
        document.getElementById("cartItems").innerHTML = '<p class="text-muted">Il carrello è vuoto.</p>';
      }
    }

    async function recuperaIndirizzoUtente() {
      try {
        var response = await fetchConControlloToken(apiBase + "/users/me", {
          headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
        });
        var user = await response.json();
        indirizzoUtente = user.indirizzo || "";
      } catch (err) {
        console.error("Errore nel recupero dell'indirizzo utente:", err);
      }
    }

    function mostraMessaggio(tipo, testo) {
      var messageBox = document.getElementById("message");
      messageBox.innerHTML = `<div class="alert alert-${tipo}" role="alert">${testo}</div>`;
    }

    function estraiComponentiIndirizzo(indirizzo) {
      var normalizzato = indirizzo.trim().replace(/\s+/g, " ");
      var capMatch = normalizzato.match(/\b\d{5}\b/);
      var cap = capMatch ? capMatch[0] : "";
      var parti = normalizzato.split(",").map(function (parte) { return parte.trim(); }).filter(Boolean);
      var via = parti.length > 0 ? parti[0] : "";
      var citta = "";

      if (parti.length > 1) {
        var ultimoBlocco = parti[parti.length - 1];
        citta = ultimoBlocco.replace(/\b\d{5}\b/g, "").trim();
      }

      return { via: via, citta: citta, cap: cap, indirizzo: normalizzato };
    }

    function corrispondeValore(valoreUtente, possibiliValori) {
      if (!valoreUtente) return true;
      var normalizzatoUtente = valoreUtente.toLowerCase().trim();
      return possibiliValori.some(function (valore) {
        return (valore || "").toLowerCase().trim() === normalizzatoUtente;
      });
    }

    async function validaIndirizzoReale(indirizzo) {
      if (!indirizzo || !indirizzo.trim()) {
        return { valido: false, errore: "Nessun indirizzo presente nel profilo. Inseriscilo prima di ordinare a domicilio." };
      }

      var componenti = estraiComponentiIndirizzo(indirizzo);
      if (!componenti.via || !componenti.citta || !componenti.cap) {
        return {
          valido: false,
          errore: "L'indirizzo deve includere via, città e CAP (es. Via Legnano 20, 20121 Milano)."
        };
      }

      try {
        var params = new URLSearchParams({
          q: componenti.indirizzo,
          format: "jsonv2",
          addressdetails: "1",
          limit: "5",
          countrycodes: "it",
          email: "support@fastfoodproject.local"
        });

        var response = await fetch("https://nominatim.openstreetmap.org/search?" + params.toString(), {
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("Servizio di geocoding non disponibile.");
        }

        var risultati = await response.json();
        if (!Array.isArray(risultati) || risultati.length === 0) {
          return { valido: false, errore: "Indirizzo non trovato su OpenStreetMap/Nominatim. Controlla i dati inseriti." };
        }

        var trovato = risultati.some(function (risultato) {
          var address = risultato.address || {};
          var capValido = corrispondeValore(componenti.cap, [address.postcode]);
          var cittaValida = corrispondeValore(componenti.citta, [
            address.city,
            address.town,
            address.village,
            address.municipality,
            address.county
          ]);
          var viaValida = corrispondeValore(componenti.via, [
            address.road ? `${address.road} ${(address.house_number || "").trim()}`.trim() : "",
            address.road,
            risultato.name
          ]);
          return capValido && cittaValida && viaValida;
        });

        if (!trovato) {
          return {
            valido: false,
            errore: "L'indirizzo esiste ma non coincide con via/città/CAP indicati. Verifica i dati."
          };
        }

        return { valido: true };
      } catch (error) {
        console.error("Errore validazione indirizzo:", error);
        return {
          valido: false,
          errore: "Errore durante la validazione dell'indirizzo. Riprova tra qualche minuto."
        };
      }
    }

    async function mostraCarrello() {
    var container = document.getElementById("cartItems");
    container.innerHTML = "";

    if (carrello.meals.length === 0) {
      container.innerHTML = '<p class="text-muted">Il carrello è vuoto.</p>';
      return;
    }

  var gruppiPerRistorante = {};
  var ristoranteNomi = {};

  await Promise.all(carrello.meals.map(async function (piatto) {
    if (!ristoranteNomi[piatto.ristorante_id]) {
      try {
        var response = await fetchConControlloToken(`${apiBase}/restaurants/${piatto.ristorante_id}`);
        if (response.ok) {
          var ristorante = await response.json();
          ristoranteNomi[piatto.ristorante_id] = ristorante.name;
        }
      } catch (err) {
        console.error(`Errore nel recupero del ristorante ${piatto.ristorante_id}:`, err);
        ristoranteNomi[piatto.ristorante_id] = "Ristorante Sconosciuto";
      }
    }
  }));

  carrello.meals.forEach(function (piatto) {
    gruppiPerRistorante[piatto.ristorante_id] = gruppiPerRistorante[piatto.ristorante_id] || [];
    gruppiPerRistorante[piatto.ristorante_id].push(piatto);
  });

  Object.keys(gruppiPerRistorante).forEach(function (ristoranteId) {
    var ristoranteHeader = document.createElement("h4");
    ristoranteHeader.textContent = `Ordine da ${ristoranteNomi[ristoranteId]}`;
    container.appendChild(ristoranteHeader);

    gruppiPerRistorante[ristoranteId].forEach(function (piatto) {
      var item = document.createElement("div");
      item.className = "d-flex justify-content-between align-items-center mb-3";
      item.innerHTML = `
        <strong>${piatto.nome}</strong>
        <span>${piatto.quantita} x ${piatto.in_offerta && piatto.prezzo_originale ? `<span class="cart-price-row"><span class="cart-old-price">€${Number(piatto.prezzo_originale).toFixed(2)}</span><span class="cart-new-price">€${Number(piatto.prezzo_unitario).toFixed(2)}</span><span class="cart-offer-badge">-${Number(piatto.sconto_percentuale || 0)}%</span></span>` : `€${Number(piatto.prezzo_unitario).toFixed(2)}`}</span>
        <button class="btn btn-danger btn-sm" onclick="rimuoviDalCarrello('${piatto._id}')">Elimina</button>`;
      container.appendChild(item);
    });
    var item = document.createElement("div");
      item.innerHTML = `
        <br>
        <label class="me-3">
          <input type="radio" name="ritiro_${ristoranteId}" value="Ritiro in Ristorante" checked>
          Ritiro in Ristorante
        </label>
        <label>
          <input type="radio" name="ritiro_${ristoranteId}" value="Consegna a Domicilio">
          Consegna a Domicilio${indirizzoUtente ? ` (${indirizzoUtente})` : ""}
        </label><br><br><hr>`
        container.appendChild(item);

    });
}

    async function rimuoviDalCarrello(mealId) {
      try {
        var response = await fetchConControlloToken(apiBase + "/carts/me/items/" + encodeURIComponent(mealId), {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
          },
          body: JSON.stringify({ meal_id: mealId })
        });

        if (!response.ok) throw new Error("Errore nella rimozione dal carrello.");

        carrello = await response.json();
        mostraCarrello();
      } catch (err) {
        console.error("Errore nella rimozione dal carrello:", err);
      }
    }

    document.getElementById("orderBtn").addEventListener("click", async function () {
        if (ordineInCorso) return;

        if (!carrello || carrello.meals.length === 0) {
          alert("Il carrello è vuoto!");
          return;
        }

        ordineInCorso = true;
        document.getElementById("orderBtn").disabled = true;
        document.getElementById("message").innerHTML = "";

        var sceltaRitiro = {};

        carrello.meals.forEach(meal => {
          var ristoranteId = meal.ristorante_id;
          var scelta = document.querySelector(`input[name="ritiro_${ristoranteId}"]:checked`).value;
          sceltaRitiro[ristoranteId] = scelta;
        });

        var haConsegnaADomicilio = Object.values(sceltaRitiro).some(function (valore) {
          return valore === "Consegna a Domicilio";
        });

        if (haConsegnaADomicilio) {
          mostraMessaggio("info", "Verifica indirizzo in corso tramite OpenStreetMap/Nominatim...");
          var risultatoValidazione = await validaIndirizzoReale(indirizzoUtente);
          if (!risultatoValidazione.valido) {
            mostraMessaggio("danger", risultatoValidazione.errore);
            ordineInCorso = false;
            document.getElementById("orderBtn").disabled = false;
            return;
          }
          mostraMessaggio("success", "Indirizzo verificato con successo.");
        }

        var ordiniPerRistoranti = {};

        carrello.meals.forEach((p) => {
          ordiniPerRistoranti[p.ristorante_id] = ordiniPerRistoranti[p.ristorante_id] || [];
          ordiniPerRistoranti[p.ristorante_id].push({
            _id: p.meal_id,
            nome: p.nome,
            quantita: p.quantita,
            prezzo_unitario: p.prezzo_unitario,
            prezzo_originale: p.prezzo_originale || null,
            in_offerta: Boolean(p.in_offerta),
            sconto_percentuale: Number(p.sconto_percentuale || 0),
            tempo_preparazione: p.tempo_preparazione || 10,
            ristorante_id : p.ristorante_id
          });
        });

        try {
          await Promise.all(
            Object.keys(ordiniPerRistoranti).map(async function (ristoranteId) {
              var orderPayload = {
                meals: ordiniPerRistoranti[ristoranteId],
                metodo_consegna: sceltaRitiro[ristoranteId]
              };

              var response = await fetchConControlloToken(apiBase + "/orders", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + localStorage.getItem("token"),
                },
                body: JSON.stringify(orderPayload),
              });

              if (!response.ok) {
                var errorText = await response.text();
                throw new Error(`Errore HTTP ${response.status}: ${errorText}`);
              }
            })
          );

          var deleteCartResponse = await fetchConControlloToken(apiBase + "/carts/me", {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") },
          });

        if (!deleteCartResponse.ok) {
          throw new Error("Errore nell'eliminazione del carrello.");
        }

        alert("Ordine effettuato con successo!");
        recuperaCarrello();
      } catch (err) {
        console.error("Errore nell'ordine:", err);
        alert(`Errore durante l'ordine: ${err.message}`);
      } finally {
        ordineInCorso = false;
        document.getElementById("orderBtn").disabled = false;
      }
    });



    (async function init() {
      await recuperaIndirizzoUtente();
      await recuperaCarrello();
    })();
  </script>
</body>
</html>
